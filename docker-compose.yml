version: "3.9"

services:

  # ── FastAPI backend ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-ai-api
    ports:
      - "8000:8000"
    env_file:
      - .env.example          # rename to .env and fill in real keys
    environment:
      - DATABASE_URL=sqlite:////app/data/agentic_ai.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./audit:/app/audit          # persist audit logs
      - ./memory:/app/memory        # persist long-term memory
      - ./data:/app/data            # persist SQLite DB
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit dashboard ──────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-ai-dashboard
    command: streamlit run dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=sqlite:////app/data/agentic_ai.db
    volumes:
      - ./audit:/app/audit
      - ./memory:/app/memory
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped

  # ── Redis (message queue + optional state backend) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: agentic-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
